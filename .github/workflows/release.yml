name: release

# Deploy = git push origin main. El CI compila, taggea, regenera loader.js y purga jsDelivr.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "loader.js"
      - "package.json"
      - "esbuild.config.mjs"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build bundle
        run: npm run build

      - name: Compute next patch tag
        id: tag
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            ver=${latest#v}
            major=$(echo "$ver" | cut -d. -f1)
            minor=$(echo "$ver" | cut -d. -f2)
            patch=$(echo "$ver" | cut -d. -f3)
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "version=${next#v}" >> "$GITHUB_OUTPUT"

      - name: Regenerate loader.js with new version
        run: |
          sed -i 's/var v = "[^"]*";/var v = "${{ steps.tag.outputs.version }}";/' loader.js

      - name: Commit dist + loader and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist loader.js
          git commit -m "build: release ${{ steps.tag.outputs.next }}" || echo "nothing to commit"
          git tag ${{ steps.tag.outputs.next }}
          git push origin HEAD:main
          git push origin ${{ steps.tag.outputs.next }}

      - name: Purge jsDelivr cache
        run: |
          tag="${{ steps.tag.outputs.next }}"
          paths=(
            "gh/karenrebecag/nx_td_lp@latest/loader.js"
            "gh/karenrebecag/nx_td_lp@main/loader.js"
            "gh/karenrebecag/nx_td_lp@latest/dist/landing.js"
            "gh/karenrebecag/nx_td_lp@latest/dist/landing.css"
            "gh/karenrebecag/nx_td_lp@${tag}/loader.js"
            "gh/karenrebecag/nx_td_lp@${tag}/dist/landing.js"
            "gh/karenrebecag/nx_td_lp@${tag}/dist/landing.css"
          )
          for path in "${paths[@]}"; do
            for attempt in 1 2 3 4 5; do
              result=$(curl -s "https://purge.jsdelivr.net/${path}")
              echo "${path} (attempt ${attempt}): ${result}"
              if echo "$result" | grep -q '"throttled":true'; then
                sleep 45
              else
                break
              fi
            done
          done
